<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiune Stocuri | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='hero.css') }}">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main id="app">
        <div id="hero-placeholder"></div>
        
<section class="container">
    <div class="card">
        <h2>Bun venit în sistemul de gestiune</h2>
        <p>Produse disponibile în baza de date:</p>
        
        <ul>
        {% for product in products %}
            <li><strong>{{ product.name }}</strong> - Stoc: {{ product.stock }}</li>
        {% else %}
            <li>Momentan nu există produse în baza de date.</li>
        {% endfor %}
        </ul>
    </div>
</section>
    </main>

    <div id="footer-placeholder"></div>

<script src="{{ url_for('static', filename='componente.js') }}"></script>
<script src="{{ url_for('static', filename='hero.js') }}"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
