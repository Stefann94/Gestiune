<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiune Produse | StockMaster Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='panou.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='categorii.css') }}">
</head>

<body>

    <div id="navbar-placeholder"></div>

    <main class="dashboard-container">

        <header class="db-header">
            <div class="welcome-text">
                <h1>Gestiune <span class="text-gradient">Produse</span></h1>
            </div>

            <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                <div class="fancy-input-group" style="width: 180px; margin-bottom: 0;">
                    <input type="text" id="productSearch" placeholder="Caută..."
                        style="padding: 8px 12px; font-size: 0.85rem;">
                </div>

                <select id="filterCategory" class="glass"
                    style="padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 0.85rem; cursor: pointer;">
                    <option value="">Toate Categoriile</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>

                <button class="btn-action" onclick="openModal('productModal')"
                    style="padding: 10px 20px; border-radius: 10px; font-size: 0.9rem; white-space: nowrap;">
                    <i class="fas fa-plus"></i> Produs Nou
                </button>
            </div>
        </header>

        <section class="bento-grid-kpi" style="margin-bottom: 2rem;">
            {% for cat in categories %}
            <div class="kpi-card glass" style="cursor: pointer; min-height: 100px;"
                onclick="filterByCategory('{{ cat.id }}')">
                <div class="kpi-icon box"><i class="fas fa-tag"></i></div>
                <div class="kpi-info">
                    <span class="label">Categorie</span>
                    <h3 class="value" style="font-size: 1.1rem;">{{ cat.name }}</h3>
                </div>
            </div>
            {% endfor %}
        </section>

    </main>

    <div id="productModal" class="modal-overlay">
        <div class="analysis-modal" style="max-width: 600px;">
            <div class="inventory-header-brand">
                <h2><i class="fas fa-box-open"></i> Produs Nou</h2>
                <span class="close-modal" onclick="closeModal('productModal')">&times;</span>
            </div>
            <div class="modal-body-scroll" style="padding: 20px;">
                <form id="productForm" class="bulk-control">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label style="color: white; font-size: 0.8rem;">Nume Produs</label>
                            <input type="text" name="name" class="fancy-input-group" required>
                        </div>
                        <div class="form-group">
                            <label style="color: white; font-size: 0.8rem;">Cod SKU</label>
                            <input type="text" name="sku" class="fancy-input-group">
                        </div>
                    </div>
                    <br>
                    <button type="submit" class="btn-action" style="width: 100%;">Salvează în Nomenclator</button>
                </form>
            </div>
        </div>
    </div>
    <div id="categoryProductsModal" class="modal-overlay">
        <div class="analysis-modal">
            <div class="inventory-header-brand">
                <div>
                    <h2 id="modalCategoryTitle"><i class="fas fa-boxes"></i> Produse Categorie</h2>
                    <p>Lista completă a produselor și stocul faptic</p>
                </div>
                <span class="close-modal" onclick="closeModal('categoryProductsModal')">&times;</span>
            </div>

            <div class="modal-body-scroll" style="max-height: 70vh; overflow-y: auto;">
                <div class="analysis-table-wrapper">
                    <table class="main-table">
                        <thead style="position: sticky; top: 0; background: #f1f5f9; z-index: 10;">
                            <tr>
                                <th>Cod (SKU)</th>
                                <th>Denumire Produs</th>
                                <th class="text-center">Preț Unitar</th>
                                <th class="text-right">Stoc Faptic</th>
                            </tr>
                        </thead>
                        <tbody id="categoryProductsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='componente.js') }}"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script src="{{ url_for('static', filename='produse_btn.js') }}"></script>
    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); document.getElementById(id).style.display = 'none'; }

        document.addEventListener('DOMContentLoaded', function () {
            if (typeof window.initCommonComponents === 'function') {
                window.initCommonComponents();
            }
        });
    </script>
</body>

</html>
